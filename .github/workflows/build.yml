name: Build

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'

jobs:
  build:
    name: Build Windows Application
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          cd neutralino-app
          npm install

      - name: Download Neutralino.js & Binaries
        run: |
          cd neutralino-app
          npx @neutralinojs/neu update

      - name: Build Application
        run: |
          cd neutralino-app
          npx @neutralinojs/neu build

      - name: Compile C# Helpers
        run: |
          C:\Windows\Microsoft.NET\Framework64\v4.0.30319\csc.exe /nologo /out:neutralino-app\auth_listener.exe neutralino-app\auth_listener.cs
          C:\Windows\Microsoft.NET\Framework64\v4.0.30319\csc.exe /nologo /out:neutralino-app\window_utils.exe neutralino-app\window_utils.cs
          C:\Windows\Microsoft.NET\Framework64\v4.0.30319\csc.exe /nologo /r:System.Security.dll /out:neutralino-app\secure_store.exe neutralino-app\secure_store.cs
          C:\Windows\Microsoft.NET\Framework64\v4.0.30319\csc.exe /nologo /r:System.Web.Extensions.dll /out:neutralino-app\fetch_lyrics.exe neutralino-app\fetch_lyrics.cs

      - name: Create Release Structure
        run: |
          mkdir dist_release
          copy neutralino-app\dist\spotify-lyrics-overlay\spotify-lyrics-overlay-win_x64.exe dist_release\spotify-lyrics-overlay.exe
          copy neutralino-app\dist\spotify-lyrics-overlay\resources.neu dist_release\resources.neu
          copy neutralino-app\auth_listener.exe dist_release\auth_listener.exe
          copy neutralino-app\fetch_lyrics.exe dist_release\fetch_lyrics.exe
          copy neutralino-app\secure_store.exe dist_release\secure_store.exe
          copy neutralino-app\window_utils.exe dist_release\window_utils.exe

      - name: Sign Executables (Optional Code Signing)
        if: ${{ secrets.SIGNING_CERT_BASE64 != '' }}
        shell: pwsh
        run: |
          $certBytes = [System.Convert]::FromBase64String("${{ secrets.SIGNING_CERT_BASE64 }}")
          [System.IO.File]::WriteAllBytes("cert.pfx", $certBytes)
          $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits" -Filter signtool.exe -Recurse | Select-Object -First 1 -ExpandProperty FullName
          & $signtool sign /f cert.pfx /p "${{ secrets.SIGNING_CERT_PASSWORD }}" /tr http://timestamp.digicert.com /td sha256 /fd sha256 dist_release\spotify-lyrics-overlay.exe
          & $signtool sign /f cert.pfx /p "${{ secrets.SIGNING_CERT_PASSWORD }}" /tr http://timestamp.digicert.com /td sha256 /fd sha256 dist_release\auth_listener.exe
          & $signtool sign /f cert.pfx /p "${{ secrets.SIGNING_CERT_PASSWORD }}" /tr http://timestamp.digicert.com /td sha256 /fd sha256 dist_release\fetch_lyrics.exe
          & $signtool sign /f cert.pfx /p "${{ secrets.SIGNING_CERT_PASSWORD }}" /tr http://timestamp.digicert.com /td sha256 /fd sha256 dist_release\secure_store.exe
          & $signtool sign /f cert.pfx /p "${{ secrets.SIGNING_CERT_PASSWORD }}" /tr http://timestamp.digicert.com /td sha256 /fd sha256 dist_release\window_utils.exe
          Remove-Item cert.pfx -Force

      - name: Compress Release Archive
        run: |
          powershell -Command "Compress-Archive -Path dist_release\* -DestinationPath spotify-lyrics-overlay-windows.zip -Force"

      - name: Build Installer (Inno Setup)
        run: |
          iscc installer.iss

      - name: Sign Installer Setup (Optional Code Signing)
        if: ${{ secrets.SIGNING_CERT_BASE64 != '' }}
        shell: pwsh
        run: |
          $certBytes = [System.Convert]::FromBase64String("${{ secrets.SIGNING_CERT_BASE64 }}")
          [System.IO.File]::WriteAllBytes("cert.pfx", $certBytes)
          $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits" -Filter signtool.exe -Recurse | Select-Object -First 1 -ExpandProperty FullName
          & $signtool sign /f cert.pfx /p "${{ secrets.SIGNING_CERT_PASSWORD }}" /tr http://timestamp.digicert.com /td sha256 /fd sha256 SpotifyLyricsOverlay-Setup-*.exe
          Remove-Item cert.pfx -Force

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: spotify-lyrics-overlay-windows
          path: |
            spotify-lyrics-overlay-windows.zip
            SpotifyLyricsOverlay-Setup-*.exe
