<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' https://api.spotify.com https://accounts.spotify.com https://lrclib.net https://api.github.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline';">
    <title>Spotify Lyrics Overlay</title>
    <!-- Silence standard browser favicon.ico requests -->
    <link rel="icon" href="data:,">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Poppins:wght@400;600;700&family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="lyrics-container">
        <!-- Drag handle -->
        <div id="drag-handle">Spotify Lyrics</div>
        
        <!-- Update Available Banner -->
        <div id="update-banner" style="display: none;">
            <span>A new update is available!</span>
            <button id="update-link-btn" class="link-btn">Download</button>
            <button id="update-close-btn" class="close-btn" title="Dismiss Update">&times;</button>
        </div>
        
        <!-- Controls bar (Always on top, Click-through, Settings) -->
        <div id="controls-bar">
            <button id="pin-btn" class="control-btn" title="Pin Window (Always on Top)">📌</button>
            <button id="lock-btn" class="control-btn" title="Lock Window (Click-Through)">🔓</button>
            <button id="settings-btn" class="control-btn" title="Window Settings">⚙️</button>
        </div>
        
        <!-- Settings Panel -->
        <div id="settings-panel" style="display: none;">
            <div class="slider-group">
                <label>Opacity: <span id="opacity-val">80%</span></label>
                <input type="range" id="opacity-slider" min="10" max="100" value="80">
            </div>
            <div class="slider-group">
                <label>Blur: <span id="blur-val">12px</span></label>
                <input type="range" id="blur-slider" min="0" max="25" value="12">
            </div>
            <div class="slider-group">
                <label>Font Family:</label>
                <select id="font-family-select">
                    <option value="Segoe UI">Segoe UI</option>
                    <option value="Inter">Inter</option>
                    <option value="Sora">Sora</option>
                    <option value="Poppins">Poppins</option>
                </select>
            </div>
            <div class="slider-group">
                <label>Font Size: <span id="font-size-val">18px</span></label>
                <input type="range" id="font-size-slider" min="12" max="32" value="18">
            </div>
            <div class="slider-group">
                <label>Line Scale:</label>
                <div class="toggle-group">
                    <label class="radio-label"><input type="radio" name="line-scale" id="line-scale-12" value="1.2" checked> 1.2x</label>
                    <label class="radio-label"><input type="radio" name="line-scale" id="line-scale-15" value="1.5"> 1.5x</label>
                </div>
            </div>
            <div class="slider-group">
                <label>Sync Offset: <span id="sync-offset-val">0ms</span></label>
                <input type="range" id="sync-offset-slider" min="-500" max="500" step="50" value="0">
            </div>
            <div class="slider-group">
                <label>Theme:</label>
                <select id="theme-select">
                    <option value="dark">Dark</option>
                    <option value="amoled">AMOLED</option>
                    <option value="light">Light</option>
                    <option value="transparent">Transparent</option>
                </select>
            </div>
            <div class="provider-order-group">
                <label class="section-label">Provider Priority:</label>
                <div id="provider-list">
                    <!-- Loaded dynamically via js -->
                </div>
            </div>
        </div>
        
        <!-- Close button for frameless window -->
        <button id="close-btn" title="Close Overlay">&times;</button>
        
        <div id="auth-section" style="display: none;">
            <p>Please login to Spotify to see lyrics</p>
            <button id="login-btn">Login to Spotify</button>
        </div>
        <div id="setup-section" style="display: none;">
            <p class="setup-title">Setup Required</p>
            <p class="setup-desc">SPOTIFY_CLIENT_ID is missing. Get your Client ID and create your .env configuration file.</p>
            <button id="get-id-btn">Get Client ID</button>
            <p class="setup-help">Watch the <span id="watch-loom-btn" class="link-btn">30-second setup video</span></p>
        </div>
        <div id="lyrics-section">
            <div id="song-info">Connecting to Spotify...</div>
            <div id="lyrics-text">Searching for lyrics...</div>
        </div>
        
        <!-- Resize handle -->
        <div id="resize-handle"></div>
    </div>
    
    <!-- Custom Right-Click Context Menu -->
    <div id="context-menu" class="context-menu" style="display: none;">
        <div id="copy-lyrics-btn" class="context-menu-item">
            <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
            <span>Copy Lyrics</span>
        </div>
    </div>
    
    <!-- Neutralino.js client -->
    <script src="/js/neutralino.js"></script>
    <!-- Your app's source files -->
    <script src="/js/main.js"></script>
</body>
</html>
